<header id="masthead" class="site-header clearfix" role="banner" *ngIf="!isMobileSite">
  <div class="header-wrapper clearfix">
    <div class="tg-container-header">
      <div class="logo">
        <a routerLink="/it" title="VisualInvest">
          <img src="https://i.imgur.com/znVHOMO.png" alt="VisualInvest" style="position: absolute; top: -80px; left: 120px; max-height: 270px; z-index: 10000;" />
        </a>
      </div>
      
      <nav id="site-navigation" class="main-navigation" role="navigation">
        <div class="menu-desktop only-desktop">
          <ul id="menu-main-menu" class="menu">
            <li><a routerLink="/it/">Home</a></li>
            <li><a routerLink="/it/chi-siamo/">Chi Siamo</a></li>
            <li><a routerLink="/it/services/">Servizi</a></li>
            <li><a routerLink="/it/contatti/">Contatti</a></li>
          </ul>
        </div>
        
        <div class="site-navigation-mobile only-mobile">
          <img class="open" src="https://placehold.co/40x40/1a2942/FFF?text=MENU" alt="Menu" (click)="toggleMobileMenu()" />
          <img class="close" src="https://placehold.co/40x40/1a2942/FFF?text=X" alt="Close" (click)="toggleMobileMenu()" />
        </div>
      </nav>
      
      <div class="only-mobile">
        <div class="menu-mobile" [class.open-menu]="mobileMenuOpen">
          <div class="row row-90 full-height align-middle">
            <div class="small-12">
              <div class="menu-mobile-container">
                <ul>
                  <ul id="menu-main-menu-1" class="menu">
                    <li><a routerLink="/it/">Home</a></li>
                    <li><a routerLink="/it/chi-siamo/">Chi Siamo</a></li>
                    <li><a routerLink="/it/services/">Servizi</a></li>
                    <li><a routerLink="/it/contatti/">Contatti</a></li>
                  </ul>
                </ul>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</header>

<router-outlet />
